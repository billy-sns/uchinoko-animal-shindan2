<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>診断スタート｜うちの子アニマル診断</title>
  <meta name="robots" content="noindex"><!-- 診断途中ページはインデックス不要 -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/style.css?v=1">

  <style>
    /* ── shindan.html 専用スタイル ── */

    /* ステップ切り替えアニメーション */
    .step-section {
      display: none;
      animation: fadeInUp 0.35s ease both;
    }
    .step-section.active {
      display: block;
    }

    /* 生年月日入力セクション */
    .birthday-section-title {
      font-size: 1.05rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
      color: var(--color-text);
    }

    .birthday-section-note {
      font-size: 0.8rem;
      color: var(--color-text-sub);
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    /* 質問カード内：選択肢の番号バッジ */
    .option-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #FADADD;
      color: var(--color-primary);
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-right: 8px;
    }

    .option-btn.selected .option-badge {
      background: var(--color-primary);
      color: white;
    }

    /* 前へ・次へボタンの並び */
    .nav-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .nav-buttons .btn {
      flex: 1;
    }

    .btn-back {
      flex: 0 0 auto !important;
      width: auto !important;
      padding: 14px 20px;
      background: none;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-full);
      font-family: var(--font-main);
      font-size: 0.9rem;
      color: var(--color-text-sub);
      cursor: pointer;
    }

    /* Q7（決め手）の特別スタイル */
    .decider-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--color-secondary), #FFD166);
      color: white;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      margin-bottom: 8px;
    }

    /* 診断中アニメーション */
    .calculating-wrap {
      text-align: center;
      padding: 40px 20px;
    }

    .calculating-emoji {
      font-size: 3rem;
      display: block;
      animation: bounce 0.8s infinite alternate ease-in-out;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-12px); }
    }

    .calculating-text {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-top: 16px;
    }

    .calculating-sub {
      font-size: 0.8rem;
      color: var(--color-text-sub);
      margin-top: 8px;
    }

    /* エラーメッセージ */
    .error-msg {
      font-size: 0.82rem;
      color: #D63031;
      background: #FFE0E0;
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      margin-top: 8px;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }
  </style>
</head>
<body>

  <div class="page-wrapper">

    <!-- ヘッダー -->
    <header class="site-header site-header--linked">
      <a href="./index.html" class="site-header-link">
        <div class="site-title">🐾 うちの子アニマル診断</div>
        <div class="site-subtitle">お子さんのトリセツを見つけよう</div>
      </a>
    </header>

    <!-- プログレスバー（常に表示） -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-text" id="progressText">ステップ 1 / 8</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill" style="width:12.5%"></div>
      </div>
    </div>

    <main>

      <!-- ===== STEP 0: 生年月日入力 ===== -->
      <section class="step-section active" id="step-birthday">
        <div class="card">
          <p class="birthday-section-title">お子さんの生年月日を入力してください</p>
          <p class="birthday-section-note">
            四柱推命・数秘術の判定に使います。<br>
            情報はこのデバイス内にのみ保存されます。
          </p>

          <div class="form-group">
            <label class="form-label">生年月日</label>
            <div class="birthday-row">
              <select class="form-select" id="birthYear" aria-label="生まれた年">
                <option value="">年</option>
              </select>
              <span class="birthday-sep">年</span>
              <select class="form-select" id="birthMonth" aria-label="生まれた月">
                <option value="">月</option>
              </select>
              <span class="birthday-sep">月</span>
              <select class="form-select" id="birthDay" aria-label="生まれた日">
                <option value="">日</option>
              </select>
              <span class="birthday-sep">日</span>
            </div>
            <div class="error-msg" id="birthdayError">
              年・月・日をすべて選んでください
            </div>
          </div>

          <div class="mt-16">
            <button class="btn btn-primary" id="btnBirthdayNext">
              次へ → 質問に答える
            </button>
          </div>
        </div>
      </section>

      <!-- ===== STEP 1〜7: 質問 ===== -->
      <!-- JavaScriptで動的に生成・表示 -->
      <section class="step-section" id="step-questions">
        <div class="question-card" id="questionCard">
          <!-- JS が描画 -->
        </div>
        <div class="nav-buttons">
          <button class="btn-back" id="btnPrev">← 戻る</button>
          <button class="btn btn-primary" id="btnNext" disabled>
            次の質問へ
          </button>
        </div>
        <div class="error-msg" id="questionError" style="margin-top:4px;">
          選択肢を選んでから次へ進んでください
        </div>
      </section>

      <!-- ===== 診断中アニメーション ===== -->
      <section class="step-section" id="step-calculating">
        <div class="calculating-wrap">
          <span class="calculating-emoji">🔮</span>
          <p class="calculating-text">うちの子を診断中…</p>
          <p class="calculating-sub">四柱推命と数秘術で分析しています</p>
        </div>
      </section>

    </main>

    <!-- トップへ戻るボタン（ステップに関わらず常に表示） -->
    <div class="back-to-top-wrap">
      <button class="btn-to-top" id="btnToTop">
        🏠 トップページへ戻る
      </button>
    </div>

  </div><!-- /page-wrapper -->

  <!-- データ・ロジックを先に読み込む -->
  <script src="./js/data.js?v=1"></script>
  <script src="./js/logic.js?v=1"></script>
  <script src="./js/shindan.js?v=1"></script>

</body>
</html>
